name: Secret scan

# Runs gitleaks on every push to main and on every PR. Fails the workflow if a
# credential is detected in the diff. Calls the reusable workflow in
# Canibuild-Ops/.github.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    uses: Canibuild-Ops/.github/.github/workflows/secret-scan.yml@main
